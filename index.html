<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Samagam Hub</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

.container{
max-width:700px;
margin:auto;
padding:15px;
}

h1{
text-align:center;
color:#00ffcc;
}

.subtitle{
text-align:center;
color:#ffa500;
margin-bottom:20px;
}

.search{
width:100%;
padding:12px;
border-radius:25px;
border:none;
outline:none;
background:#1a1a1a;
color:white;
margin-bottom:20px;
}

.section{
background:#0f2d22;
border-radius:16px;
padding:15px;
margin:20px 0;
box-shadow:0 0 15px rgba(0,255,150,0.15);
}

.section h2{
color:#ffa500;
margin-bottom:10px;
}

.count{
background:#003d2a;
padding:3px 10px;
border-radius:12px;
font-size:12px;
margin-left:8px;
}

.link{
display:flex;
justify-content:space-between;
align-items:center;
background:#013220;
padding:12px;
border-radius:10px;
margin:8px 0;
}

.link span{
font-size:13px;
word-break:break-all;
}

.btns button{
margin-left:5px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.open{background:black;color:white;}
.copy{background:#111;color:#00ffcc;}
.share{background:#ff9800;color:black;}

.footer{
text-align:center;
margin-top:20px;
color:#aaa;
font-size:12px;
}
</style>

</head>

<body>

<div class="container">

<h1>🔥 78th Nirankari Samagam 🔥</h1>
<p class="subtitle">All Official Links – Stream, Download & Cloud Access</p>

<input type="text" id="search" class="search" placeholder="Search links...">

<div id="app"></div>

<div class="footer" id="total"></div>

</div>

<script>

const data = {
"📺 Stream":[
"https://rumble.com/v74yo2q-78th-nirankari-sant-samagam-2025.html",

"https://www.nicovideo.jp/watch/sm45887902",

"https://trovo.live/s/sammethuse/549873486261?vid=up-5145403715168375608"
],

"⬇️ Stream & Download":[
"https://streamruby.com/m00wtf3n2ypy.html",
"https://nirankar.seeks.cloud/#lh1sz&dl=1",
"https://dri.me/ueoyxEoSZDC1isknqe8f9CZeuLpuY1",
"https://nirankar.player4me.vip/#d1l6i&dl=1",
"https://sendvid.com/gof5vy7y",
"https://archive.org/details/78th-nirankari-samagum-2025",

],

"📦 Download":[
"https://app.cimediacloud.com/r/oFT3XPzKZJON",
"https://share.internxt.com/sh/file/bf13cb64-2aab-4ece-9a28-46f575e5c8a7",
"https://mobidrive.com/sharelink/f/3S38YfYLm6xI3mkO3OAv947SG9D0qxAcdm2UYeav8WSX",
"https://e.pcloud.link/publink/show?code=kZ701AZLKADbBmtCXumiLVKfn54JQX32MKy",
"https://www.mediafire.com/folder/ffz29cwk5cdzx",
"https://www.fireload.com/721a50ebb232aaed",
"https://dl.uploadflix.com/ix77dqeqx4eh",
"https://filemoon.org/LJlGn9bZz15w/file",

],

"☁️ Cloud Login":[
"https://1024terabox.com/s/1SSb9KoDya6s7eEwf15V-Sw",
"https://1024terabox.com/s/1-nP_rfoakPFrL1jc5tVcQA",
"https://mypikpak.com/s/VOf8SVLzieb2uLOpgrwMCv74o2",
"https://www.4shared.com/folder/ldxhi-wS",
"https://dai.ly/x9yofzm"
]
};

const app = document.getElementById("app");

function render(filter=""){
app.innerHTML="";
let total=0;

for(let cat in data){

let filtered = data[cat].filter(link=>link.toLowerCase().includes(filter.toLowerCase()));
if(filtered.length===0) continue;

total += filtered.length;

let section = document.createElement("div");
section.className="section";

section.innerHTML = `<h2>${cat} <span class="count">${filtered.length} links</span></h2>`;

filtered.forEach(link=>{
let div = document.createElement("div");
div.className="link";

div.innerHTML = `
<span>${link}</span>
<div class="btns">
<button class="open" onclick="window.open('${link}','_blank')">Open</button>
<button class="copy" onclick="copyLink('${link}')">Copy</button>
<button class="share" onclick="shareLink('${link}')">Share</button>
</div>
`;

section.appendChild(div);
});

app.appendChild(section);
}

document.getElementById("total").innerText = "⭐ Total Links: "+total;
}

render();

document.getElementById("search").addEventListener("input",e=>{
render(e.target.value);
});

function copyLink(link){
navigator.clipboard.writeText(link);
alert("Copied!");
}

function shareLink(link){
if(navigator.share){
navigator.share({url:link});
}else{
navigator.clipboard.writeText(link);
alert("Copied (share not supported)");
}
}

</script>

</body>
</html>
