        function getDomainName(url) {
            try {
                let domain = new URL(url).hostname.replace('www.', '').split('.')[0];
                return domain.charAt(0).toUpperCase() + domain.slice(1);
            } catch (e) { return "Link"; }
        }

        function renderLinks(filter = "") {
            const container = document.getElementById('linksContainer');
            container.innerHTML = "";

            linkData.forEach(cat => {
                const filteredLinks = cat.links.filter(link => link.toLowerCase().includes(filter.toLowerCase()));
                if (filteredLinks.length === 0) return;

                const section = document.createElement('div');
                section.className = "mb-10";
                section.innerHTML = `<h2 class="text-xl font-bold text-gray-700 mb-4 border-b-2 border-blue-200 pb-2">${cat.category}</h2>`;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4";

                filteredLinks.forEach(link => {
                    grid.innerHTML += `
                        <a href="${link}" target="_blank" class="link-card bg-white p-4 rounded-lg shadow-sm border border-gray-100 flex items-center space-x-3 hover:shadow-md hover:bg-blue-50">
                            <div class="bg-blue-100 p-2 rounded-full text-blue-600">
                                <i class="fa fa-external-link-alt text-sm"></i>
                            </div>
                            <div class="overflow-hidden">
                                <p class="text-sm font-semibold text-gray-800 truncate">${getDomainName(link)}</p>
                                <p class="text-xs text-gray-400 truncate">${link}</p>
                            </div>
                        </a>
                    `;
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderLinks(e.target.value));
        renderLinks();
    </script>
</body>
