.grid{

.card{
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:10px;
text-align:center;

transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 15px #00ffd5;
}

.card img{
width:100%;
height:80px;
object-fit:cover;
border-radius:8px;
}

.player{
width:100%;
height:220px;
margin-bottom:15px;
border:none;

}

.count{

data.forEach(link=>{
let div=document.createElement("div");
div.className="card";

let img="https://picsum.photos/300?random="+Math.random();

<img src="${img}">
<p>${link.split("/")[2]}</p>
`;

div.onclick=()=>{

};

grid.appendChild(div);
});
}

};
