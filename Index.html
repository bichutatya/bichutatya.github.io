        .section-title {

            color: #818cf8;
            margin: 35px 0 15px 5px;
            padding-left: 10px;
            border-left: 4px solid var(--primary);
        }

        .link-grid { display: grid; gap: 10px; }

        .link-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: 0.2s;
        }

        .link-card:hover {
            border-color: var(--primary);
            background: #243147;
            transform: translateX(5px);
        }

        .link-info { display: flex; align-items: center; gap: 15px; overflow: hidden; }

        .link-name { font-weight: 600; font-size: 1rem; }

        .link-url {
            font-size: 0.75rem;
            color: var(--text-dim);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .btn-open {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            border: none;
        }

        .hidden { display: none; }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: var(--text-dim);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }

        });
    });
